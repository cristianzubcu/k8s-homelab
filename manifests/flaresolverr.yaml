---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: homelab
  labels:
    app: flaresolverr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      containers:
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          env:
            - name: TZ
              value: "${TZ}"
          ports:
            - containerPort: 8191
          readinessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: homelab
spec:
  selector:
    app: flaresolverr
  type: ClusterIP
  ports:
    - port: 8191
      targetPort: 8191
