# homepage-services ConfigMap is created by setup.sh from homepage/services.yaml
# with SERVER_IP substituted. This manifest is applied after that ConfigMap exists.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homelab
  labels:
    app: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: homepage
    spec:
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "*"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: homepage-config
              mountPath: /app/config
            - name: homepage-services
              mountPath: /app/config/services.yaml
              subPath: services.yaml
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: homepage-config
          persistentVolumeClaim:
            claimName: homepage-config-pvc
        - name: homepage-services
          configMap:
            name: homepage-services

---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: homelab
spec:
  selector:
    app: homepage
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
