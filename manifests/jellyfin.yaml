---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: homelab
  labels:
    app: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      containers:
        - name: jellyfin
          image: lscr.io/linuxserver/jellyfin:latest
          env:
            - name: PUID
              value: "${PUID}"
            - name: PGID
              value: "${PGID}"
            - name: TZ
              value: "${TZ}"
          ports:
            - containerPort: 8096
              name: http
            - containerPort: 8920
              name: https
            - containerPort: 7359
              protocol: UDP
              name: autodiscovery
            - containerPort: 1900
              protocol: UDP
              name: dlna
          volumeMounts:
            - name: jellyfin-config
              mountPath: /config
            - name: media
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: jellyfin-config
          persistentVolumeClaim:
            claimName: jellyfin-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: homelab
spec:
  selector:
    app: jellyfin
  type: NodePort
  ports:
    - name: http
      port: 8096
      targetPort: 8096
      nodePort: 30096
    - name: https
      port: 8920
      targetPort: 8920
      nodePort: 30920
