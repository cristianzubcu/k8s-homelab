# Portainer CE for Kubernetes — uses a ServiceAccount with ClusterRole
# to manage the cluster via the Kubernetes API.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: portainer
  namespace: homelab

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: portainer
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - pods/log
      - pods/exec
      - services
      - serviceaccounts
      - endpoints
      - persistentvolumes
      - persistentvolumeclaims
      - configmaps
      - secrets
      - replicationcontrollers
      - events
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portainer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: portainer
subjects:
  - kind: ServiceAccount
    name: portainer
    namespace: homelab

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portainer
  namespace: homelab
  labels:
    app: portainer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portainer
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: portainer
    spec:
      serviceAccountName: portainer
      containers:
        - name: portainer
          image: portainer/portainer-ce:latest
          args:
            - "--http-enabled"
          ports:
            - containerPort: 9000
              name: http
            - containerPort: 9443
              name: https
          volumeMounts:
            - name: portainer-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/status
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: portainer-data
          persistentVolumeClaim:
            claimName: portainer-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: portainer
  namespace: homelab
spec:
  selector:
    app: portainer
  type: NodePort
  ports:
    - name: https
      port: 9443
      targetPort: 9443
      nodePort: 30443
    - name: http
      port: 9000
      targetPort: 9000
      nodePort: 30900
