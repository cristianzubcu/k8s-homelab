# Persistent Volumes - DATA_DIR is substituted by setup.sh via envsubst
# Each service gets its own PV/PVC for config data.
# All media services share a single media PV/PVC.

---
# ── Media (shared by radarr, sonarr, jellyfin, bazarr, qbittorrent) ──
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-pv
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "${DATA_DIR}/media"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-pvc
  namespace: homelab
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Ti
  volumeName: media-pv
  storageClassName: ""

