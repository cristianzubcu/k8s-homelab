# Optional: deploy only if INSTALL_TAILSCALE=yes (setup.sh handles this)
# Provides remote access to the homelab network.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale
  namespace: homelab
  labels:
    app: tailscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailscale
  template:
    metadata:
      labels:
        app: tailscale
    spec:
      containers:
        - name: tailscale
          image: tailscale/tailscale:latest
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-secret
                  key: TS_AUTHKEY
            - name: TS_ROUTES
              value: "192.168.2.0/24"
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
            - name: tun
              mountPath: /dev/net/tun
      volumes:
        - name: tailscale-state
          persistentVolumeClaim:
            claimName: tailscale-state-pvc
        - name: tun
          hostPath:
            path: /dev/net/tun
